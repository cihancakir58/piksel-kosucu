<!DOCTYPE html>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background-color: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);

            padding: 60px 40px;
            text-align: center;

        .icon {

        }
        .links {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .link-btn {
            display: inline-block;
            padding: 16px 32px;
            margin: 10px auto;
            border-radius: 8px;
            text-decoration: none;
            font-size: 16px;
            font-weight: 600;
            transition: all 0.3s ease;
            cursor: pointer;
            border: none;
        }
        .link-btn.en {
            background-color: #06b2bc;
            color: white;
        }
        .link-btn.en:hover {
            background-color: #05a0a8;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(6, 178, 188, 0.3);
        }
        .link-btn.tr {
            background-color: #f68827;
            color: white;
        }
        .link-btn.tr:hover {
            background-color: #e07720;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(246, 136, 39, 0.3);
        }
        .divider {
            margin: 40px 0;
            border: none;
            border-top: 1px solid #ddd;
        }
        .footer {
            color: #999;
            font-size: 12px;
            margin-top: 30px;
        }
